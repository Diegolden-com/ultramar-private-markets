name: "Polymarket CI"

on:
  pull_request:
    paths:
      - "apps/polymarket/**"
      - ".github/workflows/polymarket-ci.yml"
      - "package.json"
      - "yarn.lock"
      - ".yarnrc.yml"
  push:
    paths:
      - "apps/polymarket/**"
      - ".github/workflows/polymarket-ci.yml"
      - "package.json"
      - "yarn.lock"
      - ".yarnrc.yml"

concurrency:
  group: polymarket-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend QA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/polymarket
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: .

      - name: Lint
        run: yarn workspace @ultramar/polymarket lint

      - name: Typecheck
        run: yarn workspace @ultramar/polymarket typecheck

      - name: Build
        run: yarn workspace @ultramar/polymarket build

  backend:
    name: Backend QA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/polymarket/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/polymarket/backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check backend tests

      - name: Migration check
        run: python -m alembic check
        env:
          DATABASE_URL: "sqlite:///./ci_check.db"

      - name: Pytest
        run: python -m pytest

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: frontend
    defaults:
      run:
        working-directory: apps/polymarket
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable
        working-directory: .

      - name: Install Playwright browser
        run: yarn workspace @ultramar/polymarket playwright:install

      - name: Run Playwright
        run: yarn workspace @ultramar/polymarket test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/polymarket/playwright-report
            apps/polymarket/test-results
          if-no-files-found: ignore
